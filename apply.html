  <!-- 応募フォーム -->
  <section class="apply apply-page">
    <div class="container">

      <!-- 応募先の求人表示 -->
      <div class="apply-job-banner" id="applyJobBanner" style="display:none;">
        <span class="apply-job-label">応募職種</span>
        <span class="apply-job-title" id="applyJobTitle"></span>
      </div>

      <h1 class="section-title">応募フォーム</h1>
      <p class="section-sub">以下の項目をご記入の上、送信してください。担当者より3営業日以内にご連絡いたします。</p>

      <form class="apply-form" id="applyForm"
            action="https://formspree.io/f/xgondebk"
            method="POST">

        <input type="hidden" name="_subject" value="【求人応募】KTグループ 採用サイトより">
        <input type="hidden" name="_next" value="">

        <div class="form-grid">
          <div class="form-group required">
            <label for="jobTitle">応募職種</label>
            <select id="jobTitle" name="応募職種" required>
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="form-group required">
            <label for="name">氏名</label>
            <input type="text" id="name" name="氏名" placeholder="例：山田 太郎" required>
          </div>
          <div class="form-group required">
            <label for="furigana">フリガナ</label>
            <input type="text" id="furigana" name="フリガナ" placeholder="例：ヤマダ タロウ" required>
          </div>
          <div class="form-group">
            <label for="birthdate">生年月日</label>
            <input type="date" id="birthdate" name="生年月日">
          </div>
          <div class="form-group">
            <label for="gender">性別</label>
            <select id="gender" name="性別">
              <option value="">選択してください</option>
              <option>男性</option>
              <option>女性</option>
              <option>回答しない</option>
            </select>
          </div>
          <div class="form-group required">
            <label for="phone">電話番号</label>
            <input type="tel" id="phone" name="電話番号" placeholder="例：090-0000-0000" required>
          </div>
          <div class="form-group required">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="メールアドレス" placeholder="例：example@mail.com" required>
          </div>
          <div class="form-group required">
            <label for="address">現住所</label>
            <input type="text" id="address" name="現住所" placeholder="例：〇〇県〇〇市〇〇町" required>
          </div>
          <div class="form-group">
            <label for="education">最終学歴</label>
            <input type="text" id="education" name="最終学歴" placeholder="例：〇〇大学 〇〇学部 卒業">
          </div>
          <div class="form-group">
            <label for="preferredType">希望雇用形態</label>
            <select id="preferredType" name="希望雇用形態">
              <option value="">選択してください</option>
              <option>正社員</option>
              <option>パート・アルバイト</option>
              <option>契約社員</option>
              <option>どちらでもよい</option>
            </select>
          </div>
        </div>

        <div class="form-group full required">
          <label for="motivation">志望動機</label>
          <textarea id="motivation" name="志望動機" rows="5" placeholder="志望動機をご記入ください" required></textarea>
        </div>
        <div class="form-group full">
          <label for="experience">職歴・経験</label>
          <textarea id="experience" name="職歴・経験" rows="4" placeholder="お持ちの職歴・経験をご記入ください（お持ちの方のみ）"></textarea>
        </div>
        <div class="form-group full">
          <label for="notes">その他連絡事項</label>
          <textarea id="notes" name="その他連絡事項" rows="3" placeholder="その他ご連絡事項があればご記入ください"></textarea>
        </div>

        <div class="form-submit">
          <p class="form-note">※ <span class="required-mark">必須</span> の項目は必ずご記入ください</p>
          <button type="submit" class="btn-submit" id="submitBtn">
            <span id="submitText">応募する</span>
          </button>
        </div>
      </form>

      <!-- 送信完了メッセージ -->
      <div class="form-success" id="formSuccess">
        <div class="success-icon">✅</div>
        <h3>応募を受け付けました</h3>
        <p>担当者より3営業日以内にご連絡いたします。<br>しばらくお待ちください。</p>

          トップページに戻る
        </a>
      </div>
